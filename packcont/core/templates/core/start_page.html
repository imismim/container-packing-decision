{% extends 'base.html' %}
{% block content %}
<div class="min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">
    <h1 class="mb-2 text-center">Виберіть свій варіант і Уперед </h1>
    <p class="text-muted mb-4 text-center">Виберіть один із 30 варіантів</p>
    <div class="row row-cols-3 row-cols-sm-5 row-cols-md-6 g-3" style="max-width: 700px; width: 150%;">
        {% for variant in variant_range %}
        <div class="col">
            <form method="post" action="{% url 'variant' slug=variant.slug %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-primary w-100">
                    {{variant.name}}
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
    <div class="row row-cols-2 row-cols-sm-1 row-cols-md-2 g-3 mt-4" style="max-width: 700px; width: 150%;">
        {% for variant in variant_test %}
        <div class="col">
            <form method="post" action="{% url 'variant' slug=variant.slug %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-primary w-100">
                    {{variant.name}}
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
