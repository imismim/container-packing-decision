
<h2>{{ name }}</h2>

<p class="meta">Рядки (контейнери): <strong>{{ rows }}</strong> &nbsp;|&nbsp; Колонки (ваги): <strong>{{ cols }}</strong></p>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                {% for cell in table.0 %}
                    <th>{{ cell }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in table %}
                {% if not forloop.first %}
                <tr>
                    {% for cell in row %}
                        <td {% if cell == "x" %}class="empty"{% endif %}>{{ cell }}</td>
                    {% endfor %}
                </tr>
                {% endif %}
            {% endfor %}
        </tbody>
    </table>
</div>
